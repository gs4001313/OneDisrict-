<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - OneDistrict</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">OneDistrict</div>

<nav>
<a href="index.html">Home</a>
<a href="grocery.html">Grocery</a>
<a href="cart.html">Cart</a>
</nav>

</header>

<section class="hero">

<h1>Checkout</h1>

<p>Complete your order</p>

</section>

<div class="card" style="max-width:500px;margin:30px auto;padding:20px;">

<h2>Delivery Details</h2>

<input type="text" id="customerName" placeholder="Full Name">

<br><br>

<input type="tel" id="customerMobile" placeholder="Mobile Number">

<br><br>

<textarea id="customerAddress"
placeholder="Delivery Address"
style="width:100%;height:120px;padding:10px;border-radius:8px;"></textarea>

<br><br>

<h3>Total Amount :
<span id="checkoutTotal">₹0</span>
</h3>

<br>

<button class="login" onclick="placeOrder()">
Place Order
</button>

</div>

<script src="script.js"></script>
